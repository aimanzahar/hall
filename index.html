<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover"/>
<title>HallBook — 24/7 self-service venue booking</title>
<link rel="stylesheet" href="styles.css"/>
<style>
  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>
<div id="root"></div>

<!-- Vendor libs -->
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/animejs@3.2.2/lib/anime.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/pocketbase@0.26.2/dist/pocketbase.umd.js"></script>

<!-- HB namespace root (must load before any layer) -->
<script type="text/babel" src="app.init.jsx"></script>

<!-- MODEL layer: pure data + query operations, no React. Auth loads first so
     the other models can access the shared `pb` client lazily. -->
<script type="text/babel" src="models/auth.model.jsx"></script>
<script type="text/babel" src="models/schedule.model.jsx"></script>
<script type="text/babel" src="models/venues.model.jsx"></script>
<script type="text/babel" src="models/bookings.model.jsx"></script>

<!-- CONTROLLER layer: React hooks that own state + actions -->
<script type="text/babel" src="controllers/useRouter.jsx"></script>
<script type="text/babel" src="controllers/useAuth.jsx"></script>
<script type="text/babel" src="controllers/useVenues.jsx"></script>
<script type="text/babel" src="controllers/useBookings.jsx"></script>
<script type="text/babel" src="controllers/useAdminBookings.jsx"></script>
<script type="text/babel" src="controllers/useTweaks.jsx"></script>
<script type="text/babel" src="controllers/useVenueSelection.jsx"></script>
<script type="text/babel" src="controllers/useSidebar.jsx"></script>

<!-- VIEW layer: pure components. Shell before screens before App. -->
<script type="text/babel" src="views/shell/Icon.jsx"></script>
<script type="text/babel" src="views/shell/VenueHero.jsx"></script>
<script type="text/babel" src="views/shell/Sidebar.jsx"></script>
<script type="text/babel" src="views/shell/Topbar.jsx"></script>
<script type="text/babel" src="views/shell/LandingHeader.jsx"></script>
<script type="text/babel" src="views/shell/ChatFab.jsx"></script>
<script type="text/babel" src="views/shell/Placeholder.jsx"></script>
<script type="text/babel" src="views/shell/TweaksPanel.jsx"></script>
<script type="text/babel" src="views/screens/HomeScreen.jsx"></script>
<script type="text/babel" src="views/screens/DiscoverScreen.jsx"></script>
<script type="text/babel" src="views/screens/VenueScreen.jsx"></script>
<script type="text/babel" src="views/screens/BookScreen.jsx"></script>
<script type="text/babel" src="views/screens/ConfirmScreen.jsx"></script>
<script type="text/babel" src="views/screens/BookingsScreen.jsx"></script>
<script type="text/babel" src="views/screens/AuthScreen.jsx"></script>
<script type="text/babel" src="views/screens/AdminLoginScreen.jsx"></script>
<script type="text/babel" src="views/screens/AdminDashboard.jsx"></script>
<script type="text/babel" src="views/App.jsx"></script>

<!-- Mount -->
<script type="text/babel">
const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "accent": "indigo",
  "theme": "light",
  "density": "comfortable",
  "cardStyle": "photo",
  "heroLayout": "editorial"
}/*EDITMODE-END*/;

ReactDOM.createRoot(document.getElementById('root'))
  .render(<HB.Views.App tweakDefaults={TWEAK_DEFAULTS}/>);
</script>
</body>
</html>
